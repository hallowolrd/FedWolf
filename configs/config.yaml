data:
  # 数据集名称，当前支持 cifar10 / cifar100
  data_name: cifar10

  # 原始数据下载或读取目录
  data_path: ./data

  # DataLoader 的 batch size
  batch_size: 32

  # Dirichlet 划分后，每个客户端至少要有多少条训练样本
  min_datasize: 32

  # Dirichlet 分布参数，越小表示客户端间数据越不均匀；
  # 官方 train 会全部按这个参数划分给各客户端
  alpha: 0.5

  # 全局随机种子，控制数据划分和训练可复现性
  seed: 1

  # 索引划分协议文件名；
  # 当前协议只保存 client_train_indices 和 global_test_indices
  partition_meta_name: partition_meta.pt

  # 划分统计信息文件名；
  # official test 由 server 持有，训练结束后只在 global_test 上评估一次
  partition_stats_name: partition_stats.json

  # DataLoader 的子进程数量，0 表示主进程加载
  num_workers: 16

  # 是否为 DataLoader 开启 pinned memory，加速 CPU->GPU 拷贝
  pin_memory: true

model:
  # 模型类型：
  # hybrid_switch_transformer = CNN stem + Transformer
  # switch_transformer = patch embedding + Transformer
  # resnet18_switch_transformer = ResNet-18 backbone + Switch Transformer
  # resnet20_switch_transformer = ResNet-20 backbone + Transformer
  # resnet32_switch_transformer = ResNet-32 backbone + Transformer
  model_type: resnet20_switch_transformer

  # 标准 switch_transformer 的显式 patch 大小；
  # 为 null 时会回退到兼容逻辑，根据 token_grid_size 推导
  # 该字段只对 switch_transformer 生效
  patch_size: null

  # 每个 Switch FFN 中的专家数量
  num_experts: 8

  # Transformer / MLP 中使用的 dropout 比例
  dropout: 0.1

  # 优化器学习率
  learning_rate: 0.0005

  # 学习率调度方式：
  # - constant: 全程固定 learning_rate
  # - cosine: 按 server round 做全局余弦退火，不是按 local epoch 或 batch
  lr_schedule: cosine

  # cosine 退火的最低学习率；建议先用初始学习率的 1/10，不要直接退到 0
  min_learning_rate: 0.00005

  # token / hidden 的嵌入维度
  embed_dim: 128

  # 多头注意力的头数
  num_heads: 4

  # FFN 隐藏层扩张倍数，hidden_dim = embed_dim * mlp_ratio
  mlp_ratio: 4.0

  # Transformer block 总层数
  depth: 4

  # depth 的别名；如果不是 null，会优先使用它覆盖 depth
  num_layers: null

  # 哪些层使用 MoE/Switch FFN，字符串形式，例如 "1,3"
  moe_layers: "1,3"

  # 每个 token 选择的专家数量，当前项目实际按 top-1 使用
  top_k: 1

  # router auxiliary loss 的权重系数
  router_aux_loss_coef: 0.01

  # router z-loss 的权重系数
  router_z_loss_coef: 0.001

  # 训练时 router 输入抖动噪声强度
  router_jitter_noise: 0.0

  # expert capacity 系数，用于控制每个 expert 一轮可接收多少 token
  capacity_factor: 1.25

  # 每个 expert 的最小 capacity
  min_capacity: 4

  # token 超过 expert capacity 时是否丢弃
  drop_tokens: true

  # Hybrid 模型 CNN stem 的通道数；标准 switch_transformer 不使用该字段
  stem_channels: 64

  # token 网格边长：
  # 对 Hybrid 表示 token pooling 后的网格边长；
  # 对标准 Switch 在 patch_size 为 null 时可用于推导 patch 大小
  token_grid_size: 8

  # 是否使用 cls token 做分类；false 时用 token mean pooling
  use_cls_token: false

train:
  # 联邦学习中的客户端数量
  num_clients: 10

  # 服务端通信轮数，也就是全局训练轮数
  server_epochs: 80

  # 每轮中每个客户端本地训练的 epoch 数
  client_epochs: 2

  # 训练设备，例如 cpu 或 cuda
  device: cuda

  # 实验输出根目录；最终会派生出 save/{run_name}/data|model|result
  save_root: save

  # 实验名称。新实验只需要改这个字段，例如 exp7
  run_name: default

  # 是否允许复用已有且非空的输出目录；false 可防止误覆盖
  allow_overwrite: false

  # 是否显示一个总训练进度条；当前只显示总进度，不显示嵌套进度条
  # 后台运行、重定向日志或输出混乱时，可以设为 false
  show_progress: true

  # 训练结束后是否在终端保留总进度条，便于查看总耗时和平均速度
  progress_leave: true

  # 是否每轮保存每个客户端的本地模型 {client_id}.pth。
  # false: 默认，不保存客户端模型，server 直接使用 Client.train() 返回的 state_dict 聚合，减少磁盘 I/O。
  # true: 调试/兼容旧流程时保存客户端模型。
  save_client_models: false

  # 聚合方法：
  # - fedavg: 全模型按客户端样本数做 FedAvg
  # - expert_fedavg: shared/router 按样本数 FedAvg，expert 按 expert usage/token usage 加权
  # - fedwolf_fisher_only: shared/router FedAvg，expert 按 raw Fisher score s 聚合，不使用 WoLF filter，作为旧 Fisher-only baseline
  # - fedwolf: 完整 FedWoLF；shared/router 按样本数 FedAvg，expert 使用 client-expert precision fusion：
  #   Fisher salience × support-calibrated filter reliability × leave-one-out update consistency，
  #   再 normalize + clip 后用于 expert 聚合。old global expert prior 是可选项，
  #   由 fedwolf_use_old_prior 控制。
  agg_method: fedwolf

  # 聚合设备：
  # - cpu: 默认，和旧行为一致，在 CPU 上聚合，显存更稳
  # - cuda/cuda:0: 将每个参数 key 的浮点聚合临时放到 GPU，可能更快但会增加聚合阶段显存占用
  # - 聚合完成后仍返回 CPU state_dict，不会长期保留 GPU 版 client state_dict
  aggregation_device: cpu

  # FedWoLF expert Fisher evidence 使用的数据加载模式：
  # - deterministic: 使用确定性 transform，不做随机增强，不 shuffle
  # - train_loader: 复用训练 loader，包含随机增强和 shuffle，用于消融
  fedwolf_evidence_loader_mode: deterministic

  # FedWoLF expert Fisher evidence 的模型模式：
  # - eval: 关闭 Dropout/BN 更新等训练态随机行为，但仍保留梯度计算
  # - train: 使用训练模式计算 evidence，更贴近训练态但随机性更强
  fedwolf_evidence_model_mode: eval

  # FedWoLF/Fisher evidence 标量压缩方式：
  # - mean_diag: 旧逻辑/PDF 对齐，grad_square_sum / (param_count * total_samples)
  # - mean_diag_active: 只在该 expert 有梯度的样本上做 mean diagonal
  # - trace_per_sample: 不除以参数量，只按 total_samples 平均
  # - trace_per_active_sample: 不除以参数量，只按该 expert 有梯度的样本数平均
  # - trace_raw: 不做平均，直接使用 grad_square_sum，仅用于消融
  fedwolf_fisher_score_mode: trace_per_active_sample

  # 每个 client 的 Fisher evidence pass 最多使用多少样本：
  # - null 或 0: 不限制，使用该 client 的全部 evidence 数据
  # - 正整数: 最多使用这么多样本；调试阶段可用 512/1024 加速
  fedwolf_fisher_max_samples: 512

  # 每个 client 的 Fisher evidence pass 最多处理多少 batch：
  # - null 或 0: 不限制
  # - 正整数: 最多处理这么多个 evidence batch；若 max_samples 同时设置，先到任一上限就停止
  fedwolf_fisher_max_batches: null

  # Fisher evidence 逐 batch 诊断记录数量：
  # - 0: 不记录逐 batch 诊断，只保留 summary
  # - N>0: 只记录前 N 个 batch
  fedwolf_fisher_debug_batches: 0

  # 是否打印完整 Fisher diagnostics：
  # - false: 正式实验默认，只打印精简 summary，不打印完整 diagnostics
  # - true: 调试模式，打印完整 diagnostics，包括 batch_grad_status 等字段
  fedwolf_fisher_debug: false

  # FedWoLF 数值稳定项；用于 Fisher 权重归一化、观测噪声分母等，防止除零
  fedwolf_eps: 1e-8

  # FedWoLF expert 可信度状态的过程噪声 q；越大表示跨轮状态允许更快漂移
  fedwolf_process_noise_q: 0.01

  # FedWoLF 观测噪声基础强度 sigma_e^2。
  # fedwolf 主方法中，R = sigma_e2 / (sqrt(relative evidence active tokens) + eps)。
  # fedwolf_fisher_only 不使用 WoLF filter，保留 raw Fisher expert 聚合作为旧 baseline。
  fedwolf_sigma_e2: 1e-4

  # WoLF-IMQ 鲁棒权重尺度 c；越小越容易对残差大的 evidence 降权
  fedwolf_imq_c: 1.0

  # FedWoLF precision fusion: update consistency 的最低保留权重，避免 non-IID 少数派客户端被完全压成 0
  fedwolf_consistency_min: 0.05

  # FedWoLF precision fusion: normalized client-expert precision 的裁剪范围
  fedwolf_lambda_min: 0.05
  fedwolf_lambda_max: 5.0

  # FedWoLF expert fusion 是否显式加入 old global expert prior。
  # - true: 显式 old-prior fusion:
  #         theta = (lambda0 * theta_old + sum_m lambda_m * theta_m)
  #                 / (lambda0 + sum_m lambda_m)
  # - false: 不显式加入 old prior:
  #          theta = sum_m lambda_m * theta_m / sum_m lambda_m
  #          旧 expert 仍会通过客户端本地训练初始化被隐式保留。
  #          如果某个 expert 没有有效客户端更新，则仍然 fallback 保留旧 global expert。
  fedwolf_use_old_prior: false
